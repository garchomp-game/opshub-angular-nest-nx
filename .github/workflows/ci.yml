name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: opshub
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/opshub?schema=public
      JWT_SECRET: ci-test-jwt-secret
      JWT_REFRESH_SECRET: ci-test-jwt-refresh-secret
      SMTP_HOST: localhost
      SMTP_PORT: 1025
      MAIL_FROM: noreply@opshub.local
      APP_URL: http://localhost:4200
      REDIS_HOST: localhost
      REDIS_PORT: 6379

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - uses: actions/cache@v4
        with:
          path: node_modules/.cache
          key: nx-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - name: Derive NX affected base
        id: nx-base
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "base=origin/${{ github.event.pull_request.base.ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "base=HEAD~1" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate Prisma Client
        run: bunx prisma generate --schema=libs/prisma-db/prisma/schema.prisma

      - name: Run Prisma Migrations
        run: bunx prisma migrate deploy --schema=libs/prisma-db/prisma/schema.prisma

      - name: Generate API Client
        run: bun run generate:api-client

      - name: Lint (affected)
        run: bunx nx affected --target=lint --base=${{ steps.nx-base.outputs.base }} --max-warnings=50

      - name: Test (affected)
        run: bunx nx affected --target=test --base=${{ steps.nx-base.outputs.base }} --watch=false

      - name: Build (affected)
        run: bunx nx affected --target=build --base=${{ steps.nx-base.outputs.base }}

      - name: Install Playwright Browsers
        run: bunx playwright install --with-deps chromium

      - name: Seed Database
        run: bunx prisma db seed --schema=libs/prisma-db/prisma/schema.prisma

      - name: Run Playwright Tests
        run: bunx playwright test
        env:
          CI: true

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
